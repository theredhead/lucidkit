<ui-media-player
  [type]="type()"
  [source]="source()"
  [sources]="sources()"
  [tracks]="tracks()"
  [controls]="controls()"
  [loop]="loop()"
  [autoplay]="autoplay()"
  [preload]="preload()"
  [fit]="fit()"
  [poster]="poster()"
  [crossOrigin]="crossOrigin()"
  [ariaLabel]="ariaLabel()"
  [playbackRates]="playbackRates()"
  [muted]="muted()"
  [volume]="volume()"
  (mediaPlay)="mediaPlay.emit($event)"
  (mediaPause)="mediaPause.emit($event)"
  (mediaEnded)="mediaEnded.emit($event)"
  (mediaTimeUpdate)="mediaTimeUpdate.emit($event)"
  (mediaLoadedMetadata)="mediaLoadedMetadata.emit($event)"
  (mediaError)="mediaError.emit($event)"
/>
