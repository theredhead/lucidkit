<div
  class="header"
  role="button"
  [attr.aria-expanded]="expanded()"
  [attr.aria-label]="ariaLabel() ?? label()"
  [attr.aria-disabled]="disabled()"
  [attr.tabindex]="disabled() ? -1 : 0"
  (click)="toggle()"
  (keydown)="onHeaderKeyDown($event)"
>
  <span class="title">{{ label() }}</span>
  <svg class="chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
    <polyline points="4,6 8,10 12,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </svg>
</div>

@if (expanded()) {
  <div class="panel" role="region">
    <div class="content" [class.flush]="contentPadding() === 'none'">
      <ng-content />
    </div>
  </div>
}
