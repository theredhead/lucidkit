@if (variant() === 'icon') {
  <button
    class="btn btn--icon"
    type="button"
    (click)="toggle()"
    [attr.aria-label]="ariaLabel()"
  >
    <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path [attr.d]="iconPath" />
    </svg>
  </button>
} @else {
  <button
    class="btn btn--text"
    type="button"
    (click)="toggle()"
    [attr.aria-label]="ariaLabel()"
  >
    <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path [attr.d]="iconPath" />
    </svg>
    <span class="label">{{ label }}</span>
  </button>
}
