@if (variant() === 'icon') {
  <button
    class="tt-btn tt-btn--icon"
    type="button"
    (click)="toggle()"
    [attr.aria-label]="ariaLabel()"
  >
    <svg class="tt-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path [attr.d]="iconPath" />
    </svg>
  </button>
} @else {
  <button
    class="tt-btn tt-btn--text"
    type="button"
    (click)="toggle()"
    [attr.aria-label]="ariaLabel()"
  >
    <svg class="tt-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path [attr.d]="iconPath" />
    </svg>
    <span class="tt-label">{{ label }}</span>
  </button>
}
