@for (toast of visibleToasts(); track toast.id) {
  <div
    class="toast"
    [class.toast--info]="toast.severity === 'info'"
    [class.toast--success]="toast.severity === 'success'"
    [class.toast--warning]="toast.severity === 'warning'"
    [class.toast--error]="toast.severity === 'error'"
    [class.toast--exiting]="toast.exiting"
    role="alert"
    aria-live="assertive"
  >
    <div class="toast-icon">
      @switch (toast.severity) {
        @case ('success') {
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.7-9.3a1 1 0 00-1.4-1.4L9 10.6 7.7 9.3a1 1 0 00-1.4 1.4l2 2a1 1 0 001.4 0l4-4z" />
          </svg>
        }
        @case ('warning') {
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 9a1 1 0 100-2 1 1 0 000 2z" />
          </svg>
        }
        @case ('error') {
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" />
          </svg>
        }
        @default {
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" />
          </svg>
        }
      }
    </div>
    <div class="toast-content">
      @if (toast.title) {
        <div class="toast-title">{{ toast.title }}</div>
      }
      <div class="toast-message">{{ toast.message }}</div>
    </div>
    @if (toast.actionLabel) {
      <button class="toast-action" (click)="executeAction(toast)">
        {{ toast.actionLabel }}
      </button>
    }
    <button
      class="toast-close"
      (click)="dismiss(toast)"
      aria-label="Dismiss notification"
    >
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M4.28 3.22a.75.75 0 00-1.06 1.06L6.94 8l-3.72 3.72a.75.75 0 101.06 1.06L8 9.06l3.72 3.72a.75.75 0 101.06-1.06L9.06 8l3.72-3.72a.75.75 0 00-1.06-1.06L8 6.94 4.28 3.22z" />
      </svg>
    </button>
  </div>
}
