
    <p class="demo-info">
      Click any task bar or milestone to open a popover with metadata and links
      to documentation.
    </p>
    <ui-gantt-chart
      [datasource]="datasource"
      [viewMode]="viewMode()"
      [rowHeight]="rowHeight()"
      [showToday]="showToday()"
      [showTaskList]="showTaskList()"
      [taskListWidth]="taskListWidth()"
      [paddingDays]="paddingDays()"
      [ariaLabel]="ariaLabel()"
      (taskClicked)="openPopover($event)"
    />
