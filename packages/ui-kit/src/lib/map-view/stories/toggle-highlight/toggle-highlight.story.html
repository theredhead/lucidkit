
    <div
      style="display:flex;justify-content:flex-end;gap:0.5rem;margin:0 0 0.75rem;"
    >
      <ui-button variant="outlined" (click)="toggle()">
        {{ highlighted() ? "Remove highlight" : "Highlight route" }}
      </ui-button>
    </div>
    <ui-map-view
      [center]="center"
      [zoom]="zoom()"
      [width]="width()"
      [markers]="markers"

      [polygons]="polygons()"
      [height]="height()"
      [ariaLabel]="ariaLabel()"
    />
