
    <h3>Multi-Series Scatter — Revenue vs Cost</h3>
    <ui-chart
      [source]="data"
      labelProperty="month"
      valueProperty="revenue"
      [sources]="layers"
      [strategy]="strategy"
      [width]="width()"
      [height]="height()"
      [showLegend]="showLegend()"
      [ariaLabel]="ariaLabel()"
    />
    <p>
      Each series is rendered as a different-coloured group of circles, all
      sharing the same Y-axis scale.
    </p>
