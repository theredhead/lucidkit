
    <h3>Grouped Bar — Revenue vs Cost</h3>
    <ui-chart
      [source]="data"
      labelProperty="month"
      valueProperty="revenue"
      [sources]="layers"
      [strategy]="strategy"
      [width]="width()"
      [height]="height()"
      [showLegend]="showLegend()"
      [ariaLabel]="ariaLabel()"
    />
    <p>
      Multiple series render as grouped bars at each X position. The column
      width is automatically divided among the series.
    </p>
