
    <h3>Pie Chart — Browser Market Share</h3>
    <ui-chart
      [source]="data"
      labelProperty="browser"
      valueProperty="share"
      [strategy]="strategy"
      [width]="width()"
      [height]="height()"
      [showLegend]="showLegend()"
      [ariaLabel]="ariaLabel()"
    />
    <p>
      Classic pie chart. Slices are separated by a thin stroke matching the
      chart background for visual clarity.
    </p>
