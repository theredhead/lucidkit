
    <h3>Pie Chart — No Legend</h3>
    <ui-chart
      [source]="data"
      labelProperty="browser"
      valueProperty="share"
      [strategy]="strategy"
      [showLegend]="showLegend()"
      [width]="width()"
      [height]="height()"
      [ariaLabel]="ariaLabel()"
    />
    <p>
      Set <code>[showLegend]="false"</code> to hide the legend entirely — useful
      when labels are displayed externally.
    </p>
