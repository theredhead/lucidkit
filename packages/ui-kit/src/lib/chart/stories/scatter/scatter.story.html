
    <h3>Scatter Plot — City Temperatures</h3>
    <ui-chart
      [source]="data"
      labelProperty="city"
      valueProperty="temp"
      [strategy]="strategy"
      [width]="560"
      [height]="340"
      ariaLabel="City temperature scatter plot"
    />
    <p>
      Each data point is rendered as an individual circle. Marker radius and
      opacity are configurable via strategy options.
    </p>
