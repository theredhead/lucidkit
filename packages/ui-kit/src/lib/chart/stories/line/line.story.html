
    <h3>Line Chart — Monthly Revenue</h3>
    <ui-chart
      [source]="data"
      labelProperty="month"
      valueProperty="revenue"
      [strategy]="strategy"
      [width]="width()"
      [height]="height()"
      [showLegend]="showLegend()"
      [ariaLabel]="ariaLabel()"
    />
    <p>
      Connected polyline with circular markers at each data point. Stroke width
      and marker radius are configurable.
    </p>
