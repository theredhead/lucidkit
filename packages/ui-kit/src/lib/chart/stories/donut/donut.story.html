
    <h3>Donut Chart — Browser Market Share</h3>
    <ui-chart
      [source]="data"
      labelProperty="browser"
      valueProperty="share"
      [strategy]="strategy"
      [width]="width()"
      [height]="height()"
      [showLegend]="showLegend()"
      [ariaLabel]="ariaLabel()"
    />
    <p>
      Donut variant — set <code>innerRadiusRatio</code> on the
      <code>PieChartStrategy</code> to control the hole size (0 = full pie, 1 =
      no visible ring).
    </p>
