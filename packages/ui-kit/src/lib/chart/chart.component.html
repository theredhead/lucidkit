<div
  class="viewport"
  #chartContainer
  [style.width.px]="width()"
  [style.height.px]="height()"
  [attr.aria-label]="ariaLabel()"
  role="img"
></div>

@if (showLegend() && legendEntries().length > 0) {
  <ul class="legend" role="list" aria-label="Chart legend">
    @for (entry of legendEntries(); track entry.label) {
      <li class="legend__item">
        <span
          class="legend__swatch"
          [style.background-color]="entry.color"
        ></span>
        <span class="legend__label">{{ entry.label }}</span>
        <span class="legend__value">{{ entry.value }}</span>
      </li>
    }
  </ul>
}
