
    <div
      style="display: flex; flex-direction: column; gap: 32px; max-width: 400px"
    >
      <div>
        <h4 style="margin: 0 0 8px">Price range</h4>
        <ui-slider
          [mode]="mode()"
          [(value)]="priceRange"
          [min]="min()"
          [max]="max()"
          [step]="step()"
          [showValue]="showValue()"
          [showMinMax]="showMinMax()"
          [showTicks]="showTicks()"
          [disabled]="disabled()"
          [ariaLabel]="ariaLabel()"
        />
      </div>
      <div>
        <h4 style="margin: 0 0 8px">Age range</h4>
        <ui-slider
          mode="range"
          [(value)]="ageRange"
          [min]="18"
          [max]="65"
          [showValue]="true"
          ariaLabel="Age"
        />
      </div>
    </div>
