@for (star of stars(); track star) {
  <button
    class="star"
    type="button"
    role="radio"
    [class.filled]="isFilled(star)"
    [class.hovered]="star <= hovered()"
    [attr.aria-label]="star + ' star' + (star === 1 ? '' : 's')"
    [attr.aria-checked]="star === value()"
    [attr.tabindex]="(star === (value() || 1)) ? 0 : -1"
    [disabled]="readonly() || disabled() || null"
    (click)="select(star)"
    (mouseenter)="onHover(star)"
    (mouseleave)="onLeave()"
    (keydown)="onKeyDown($event, star)"
  >
    <svg
      class="star-icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <polygon
        [attr.fill]="isFilled(star) ? 'currentColor' : 'none'"
        points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
      />
    </svg>
  </button>
}
