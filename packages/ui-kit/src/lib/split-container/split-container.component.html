<div class="container" #container>
  @for (panel of panels(); track $index) {
    <div
      class="panel"
      [style.flex]="panelFlex($index)"
    >
      <ng-container [ngTemplateOutlet]="panel.tpl()" />
    </div>
    @if (!$last) {
      <div
        class="divider ui-surface-type-raised"
        role="separator"
        tabindex="0"
        [attr.aria-label]="ariaLabel()"
        [attr.aria-orientation]="orientation()"
        [attr.aria-valuenow]="sizes()[$index]"
        aria-valuemin="0"
        aria-valuemax="100"
        (pointerdown)="onDividerPointerDown($event, $index)"
        (dblclick)="onDividerDblClick($index)"
        (keydown)="onDividerKeydown($event, $index)"
      >
        <div class="divider-handle"></div>
      </div>
    }
  }
</div>
