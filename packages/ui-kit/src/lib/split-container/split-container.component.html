<div class="container" #container>
  <div class="panel panel--first" [style.flex]="firstFlex()">
    <ng-content select="[first]" />
  </div>

  <div
    class="divider"
    role="separator"
    tabindex="0"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-orientation]="orientation()"
    [attr.aria-valuenow]="firstPercent()"
    aria-valuemin="0"
    aria-valuemax="100"
    (pointerdown)="onDividerPointerDown($event)"
    (dblclick)="onDividerDblClick()"
    (keydown)="onDividerKeydown($event)"
  >
    <div class="divider__handle"></div>
  </div>

  <div class="panel panel--second" [style.flex]="secondFlex()">
    <ng-content select="[second]" />
  </div>
</div>
