<ui-split-container
  name="my-app-sidebar"
  [orientation]="orientation()"
  [initialSizes]="[35, 65]"
  [dividerWidth]="dividerWidth()"
  [disabled]="disabled()"
  [ariaLabel]="ariaLabel()"
  (resized)="onResized($event)"
>
  <ui-split-panel>
    <div class="panel sidebar"><h4>Persistent Sidebar</h4></div>
  </ui-split-panel>
  <ui-split-panel>
    <div class="panel main">
      <p>Sizes are saved to <code>localStorage</code> under <code>ui-split-container:my-app-sidebar</code>.</p>
    </div>
  </ui-split-panel>
</ui-split-container>
