<ui-split-container
  [orientation]="orientation()"
  [dividerWidth]="dividerWidth()"
  [disabled]="disabled()"
  [ariaLabel]="ariaLabel()"
  (resized)="onResized($event)"
>
  <ui-split-panel>
    <div class="panel left"><h4>Left</h4></div>
  </ui-split-panel>
  <ui-split-panel>
    <div class="panel right"><h4>Right</h4></div>
  </ui-split-panel>
</ui-split-container>
