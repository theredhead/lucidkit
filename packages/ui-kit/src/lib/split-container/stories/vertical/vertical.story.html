<ui-split-container
  [orientation]="orientation()"
  [initialSizes]="[30, 70]"
  [dividerWidth]="dividerWidth()"
  [disabled]="disabled()"
  [ariaLabel]="ariaLabel()"
  (resized)="onResized($event)"
>
  <ui-split-panel>
    <div class="panel top-panel"><h4>Top Panel</h4></div>
  </ui-split-panel>
  <ui-split-panel>
    <div class="panel bottom-panel"><h4>Bottom Panel</h4></div>
  </ui-split-panel>
</ui-split-container>
