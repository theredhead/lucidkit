<ui-split-container
  [orientation]="orientation()"
  [dividerWidth]="dividerWidth()"
  [disabled]="disabled()"
  [ariaLabel]="ariaLabel()"
  (resized)="onResized($event)"
>
  <ui-split-panel [min]="150" [max]="400">
    <div class="panel sidebar"><h4>Sidebar (150–400 px)</h4></div>
  </ui-split-panel>
  <ui-split-panel [min]="200">
    <div class="panel main"><h4>Main (min 200 px)</h4></div>
  </ui-split-panel>
</ui-split-container>
