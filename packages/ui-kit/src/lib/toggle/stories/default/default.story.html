<div
  style="display: flex; flex-direction: column; gap: 16px; font-family: system-ui, sans-serif;"
>
  <ui-toggle
    [value]="currentValue()"
    [onLabel]="onLabel()"
    [offLabel]="offLabel()"
    [size]="size()"
    [disabled]="disabled()"
    [ariaLabel]="ariaLabel()"
    (valueChange)="onValueChange($event)"
  >
    Example toggle
  </ui-toggle>
  <p style="font-size: 13px; color: #888; margin: 0;">
    value={{ currentValue() }}
  </p>
</div>
