<ui-repeater
  [datasource]="ds"
  [reorderable]="reorderable()"
  [ariaLabel]="ariaLabel()"
  (reordered)="onReorder($event)"
>
  <ng-template let-item let-i="index">
    <div class="row">
      <span class="handle">⠿</span>
      <strong>#{{ i + 1 }} {{ item.name }}</strong>
    </div>
  </ng-template>
</ui-repeater>
