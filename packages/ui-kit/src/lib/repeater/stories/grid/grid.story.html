
    <ui-repeater
      [datasource]="ds"
      [reorderable]="reorderable()"
      [ariaLabel]="ariaLabel()"
    >
      <ng-template let-photo let-i="index">
        <figure class="card">
          <img
            [src]="photo.url"
            [alt]="photo.name"
            loading="lazy"
            width="200"
            height="200"
          />
          <figcaption>#{{ i + 1 }} {{ photo.name }}</figcaption>
        </figure>
      </ng-template>
    </ui-repeater>
