
    <ui-repeater
      [datasource]="ds"
      [reorderable]="reorderable()"
      [ariaLabel]="ariaLabel()"
    >
      <ng-template let-photo let-even="even">
        <div class="tile" [class.even]="even">
          <img
            [src]="photo.url"
            [alt]="photo.name"
            loading="lazy"
            width="120"
            height="120"
          />
          <span class="label">{{ photo.name }}</span>
        </div>
      </ng-template>
    </ui-repeater>
