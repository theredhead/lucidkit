@if (reorderable()) {
  @for (item of items(); track item; let i = $index) {
    <div class="item">
      <ng-container
        [ngTemplateOutlet]="itemTemplate()"
        [ngTemplateOutletContext]="buildContext(item, i)"
      />
    </div>
  }
} @else {
  @for (item of items(); track item; let i = $index) {
    <ng-container
      [ngTemplateOutlet]="itemTemplate()"
      [ngTemplateOutletContext]="buildContext(item, i)"
    />
  }
}
