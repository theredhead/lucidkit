<div class="header">
  <span class="title">{{ dateLabel() }}</span>
</div>
<div class="events">
  @for (evt of day().events; track evt.id) {
    <button type="button" class="event" (click)="onEventClick(evt)">
      <span class="dot" [style.background-color]="evt.color"></span>
      <span class="event-title">{{ evt.title }}</span>
      @if (!evt.allDay) {
        <span class="event-time">{{ formatTime(evt.start) }}</span>
      }
    </button>
  }
</div>
