<div class="cal-container" [class.cal-container--week-numbers]="showWeekNumbers()" [attr.aria-label]="ariaLabel()" role="grid">
  <!-- Header: navigation + month label -->
  <div class="cal-header" role="presentation">
    <button
      type="button"
      class="cal-nav-btn"
      aria-label="Previous month"
      (click)="previousMonth()"
    >◀</button>

    <button
      type="button"
      class="cal-month-label"
      aria-label="Go to today"
      (click)="goToToday()"
    >{{ monthLabel() }}</button>

    <button
      type="button"
      class="cal-nav-btn"
      aria-label="Next month"
      (click)="nextMonth()"
    >▶</button>
  </div>

  <!-- Weekday headers -->
  <div class="cal-weekdays" role="row">
    @if (showWeekNumbers()) {
      <div class="cal-weekday cal-weekday--wk" role="columnheader" aria-label="Week number">Wk</div>
    }
    @for (wd of weekdays; track wd) {
      <div class="cal-weekday" role="columnheader">{{ wd }}</div>
    }
  </div>

  <!-- Day grid -->
  @for (week of weeks(); track $index) {
    <div class="cal-week" role="row">
      @if (showWeekNumbers()) {
        <div class="cal-week-number" role="rowheader" [attr.aria-label]="'Week ' + week.weekNumber">
          {{ week.weekNumber }}
        </div>
      }
      @for (day of week.days; track day.iso) {
        <button
          type="button"
          class="cal-day"
          [class.cal-day--outside]="!day.inMonth"
          [class.cal-day--today]="day.isToday"
          [class.cal-day--selected]="isSelected(day)"
          [attr.aria-label]="day.date.toDateString()"
          [attr.aria-current]="day.isToday ? 'date' : null"
          role="gridcell"
          (click)="onDayClick(day, $event)"
        >
          <span class="cal-day__number">{{ day.day }}</span>

          @if (day.events.length > 0) {
            <div class="cal-day__events">
              @for (evt of day.events | slice:0:maxEventsPerDay(); track evt.id) {
                <span
                  class="cal-event"
                  [style.background-color]="evt.color"
                  [title]="evt.title"
                >{{ evt.title }}</span>
              }
              @if (overflowCount(day) > 0) {
                <span class="cal-event--overflow">
                  +{{ overflowCount(day) }} more
                </span>
              }
            </div>
          }
        </button>
      }
    </div>
  }
</div>
