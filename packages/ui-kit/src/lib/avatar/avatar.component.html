@if (showSkeleton()) {
  <ui-skeleton variant="circle" width="100%" height="100%" />
} @else if (showImage()) {
  <img
    class="image"
    [src]="effectiveSrc()"
    [alt]="ariaLabel() ?? name()"
    (error)="onImageError()"
  />
} @else if (initials()) {
  <span class="initials" [attr.aria-label]="ariaLabel() ?? name()">
    {{ initials() }}
  </span>
} @else {
  <svg class="fallback" viewBox="0 0 24 24" fill="none" [attr.aria-label]="ariaLabel() ?? 'Avatar'">
    <circle cx="12" cy="8" r="4" fill="currentColor" />
    <path d="M4 20c0-3.314 3.582-6 8-6s8 2.686 8 6" fill="currentColor" />
  </svg>
}
