
    <ui-table-view
      uiDensity="comfortable"
      [caption]="caption()"
      tableId="story-template-col"
      [selectionMode]="selectionMode()"
      [rowClickSelect]="rowClickSelect()"
      [showRowIndexIndicator]="showRowIndexIndicator()"
      [showBuiltInPaginator]="showBuiltInPaginator()"
      [showSelectionColumn]="showSelectionColumn()"
      [pageSize]="pageSize()"
      [disabled]="disabled()"
      [datasource]="adapter"
    >
      <ui-number-column
        key="id"
        headerText="ID"
        [sortable]="true"
        [format]="{ maximumFractionDigits: 0 }"
      />
      <ui-text-column
        key="title"
        headerText="Title"
        [truncate]="true"
        [sortable]="true"
      />
      <ui-template-column key="userId" headerText="Author">
        <ng-template let-row>
          <span class="author-chip">
            <span class="author-avatar">{{ row.userId }}</span>
            <span>User {{ row.userId }}</span>
          </span>
        </ng-template>
      </ui-template-column>
      <ui-template-column key="actions" headerText="Actions">
        <ng-template let-row>
          <ui-button
            variant="outlined"
            size="small"
            (click)="onAction('view', row)"
          >
            View
          </ui-button>
          <ui-button size="small" class="edit-button" (click)="onAction('edit', row)">
            Edit
          </ui-button>
        </ng-template>
      </ui-template-column>
    </ui-table-view>
    <pre class="tpl-output">{{ lastAction() }}</pre>
