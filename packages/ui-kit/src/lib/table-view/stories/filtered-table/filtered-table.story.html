
    <ui-filter
      [fields]="fields"
      [allowJunction]="true"
      (expressionChange)="onExpressionChange($event)"
    />
    <div class="table-wrapper">
      <ui-table-view
        [uiDensity]="density()"
        [caption]="caption()"
        tableId="story-filtered"
        [selectionMode]="selectionMode()"
        [rowClickSelect]="rowClickSelect()"
        [showRowIndexIndicator]="showRowIndexIndicator()"
        [showBuiltInPaginator]="showBuiltInPaginator()"
        [showSelectionColumn]="showSelectionColumn()"
        [pageSize]="pageSize()"
        [disabled]="disabled()"
        [selectionModel]="selectionModel()"
        [datasource]="datasource"
      >
        <ui-number-column
          key="id"
          headerText="ID"
          [sortable]="true"
          [format]="{ maximumFractionDigits: 0 }"
        />
        <ui-text-column key="name" headerText="Name" [sortable]="true" />
        <ui-badge-column key="department" headerText="Dept" variant="neutral" />
        <ui-text-column key="region" headerText="Region" [sortable]="true" />
        <ui-number-column
          key="age"
          headerText="Age"
          [sortable]="true"
          [format]="{ maximumFractionDigits: 0 }"
        />
        <ui-number-column
          key="tenureYears"
          headerText="Tenure"
          [sortable]="true"
          [format]="{ maximumFractionDigits: 0 }"
        />
        <ui-number-column
          key="salary"
          headerText="Salary"
          [sortable]="true"
          [format]="{
            style: 'currency',
            currency: 'USD',
            maximumFractionDigits: 0,
          }"
        />
        <ui-text-column
          key="hireDate"
          headerText="Hire Date"
          [sortable]="true"
        />
      </ui-table-view>
    </div>
