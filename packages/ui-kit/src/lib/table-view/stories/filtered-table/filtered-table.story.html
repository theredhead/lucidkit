
    <ui-filter
      [fields]="fields"
      [allowJunction]="true"
      (expressionChange)="onExpressionChange($event)"
    />
    <div style="margin-top:0.75rem;">
      <ui-table-view
        uiDensity="comfortable"
        caption="Employees"
        tableId="story-filtered"
        [showRowIndexIndicator]="true"
        [showBuiltInPaginator]="true"
        [datasource]="datasource"
      >
        <ui-number-column
          key="id"
          headerText="ID"
          [sortable]="true"
          [format]="{ maximumFractionDigits: 0 }"
        />
        <ui-text-column key="name" headerText="Name" [sortable]="true" />
        <ui-badge-column key="department" headerText="Dept" variant="neutral" />
        <ui-number-column
          key="age"
          headerText="Age"
          [sortable]="true"
          [format]="{ maximumFractionDigits: 0 }"
        />
        <ui-number-column
          key="salary"
          headerText="Salary"
          [sortable]="true"
          [format]="{
            style: 'currency',
            currency: 'USD',
            maximumFractionDigits: 0,
          }"
        />
        <ui-text-column
          key="hireDate"
          headerText="Hire Date"
          [sortable]="true"
        />
      </ui-table-view>
    </div>
