
    <ui-table-view
      [uiDensity]="density()"
      [caption]="caption()"
      tableId="story-photos"
      [selectionMode]="selectionMode()"
      [rowClickSelect]="rowClickSelect()"
      [showRowIndexIndicator]="showRowIndexIndicator()"
      [showBuiltInPaginator]="showBuiltInPaginator()"
      [showSelectionColumn]="showSelectionColumn()"
      [pageSize]="pageSize()"
      [disabled]="disabled()"
      [datasource]="adapter"
    >
      <ui-number-column
        key="id"
        headerText="ID"
        [sortable]="true"
        [format]="{ maximumFractionDigits: 0 }"
      />
      <ui-number-column
        key="albumId"
        headerText="Album ID"
        [sortable]="true"
        [format]="{ maximumFractionDigits: 0 }"
      />
      <ui-text-column
        key="title"
        headerText="Title"
        [truncate]="true"
        [sortable]="true"
      />
      <ui-text-column
        key="thumbnailUrl"
        headerText="Thumbnail URL"
        [truncate]="true"
      />
    </ui-table-view>
