
    <ui-table-view
      [uiDensity]="density()"
      [caption]="caption()"
      tableId="story-comments"
      [selectionMode]="selectionMode()"
      [rowClickSelect]="rowClickSelect()"
      [showRowIndexIndicator]="showRowIndexIndicator()"
      [showBuiltInPaginator]="showBuiltInPaginator()"
      [showSelectionColumn]="showSelectionColumn()"
      [pageSize]="pageSize()"
      [disabled]="disabled()"
      [datasource]="adapter"
    >
      <ui-number-column
        key="id"
        headerText="ID"
        [sortable]="true"
        [format]="{ maximumFractionDigits: 0 }"
      />
      <ui-number-column
        key="postId"
        headerText="Post ID"
        [sortable]="true"
        [format]="{ maximumFractionDigits: 0 }"
      />
      <ui-text-column
        key="email"
        headerText="Email"
        [truncate]="true"
        [sortable]="true"
      />
      <ui-text-column key="body" headerText="Comment" [truncate]="true" />
    </ui-table-view>
