
    <ui-table-view
      uiDensity="comfortable"
      [caption]="caption()"
      tableId="story-multi-select"
      [selectionMode]="selectionMode()"
      [rowClickSelect]="rowClickSelect()"
      [showRowIndexIndicator]="showRowIndexIndicator()"
      [showBuiltInPaginator]="showBuiltInPaginator()"
      [showSelectionColumn]="showSelectionColumn()"
      [pageSize]="pageSize()"
      [disabled]="disabled()"
      [datasource]="adapter"
      [selectionModel]="selectionModel"
      (selectionChange)="onSelectionChange($event)"
    >
      <ui-number-column
        key="id"
        headerText="ID"
        [sortable]="true"
        [format]="{ maximumFractionDigits: 0 }"
      />
      <ui-number-column
        key="userId"
        headerText="User ID"
        [sortable]="true"
        [format]="{ maximumFractionDigits: 0 }"
      />
      <ui-text-column
        key="title"
        headerText="Title"
        [truncate]="true"
        [sortable]="true"
      />
      <ui-badge-column key="userId" headerText="Owner" variant="neutral" />
    </ui-table-view>
    <pre class="selection-output">
Selected ({{ selectedCount() }}): {{ selectedJson() }}</pre>
