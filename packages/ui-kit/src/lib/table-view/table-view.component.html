<div class="slot">
    <ng-content />
</div>

<section class="root" role="table" [attr.aria-labelledby]="captionAriaLabelledBy()">
    @if (caption()) {
    <div class="caption" [id]="captionId">{{ caption() }}</div>
    }
    <ui-table-header [columns]="resolvedColumns()" [showRowIndexIndicator]="showRowIndexIndicator()"
        [rowIndexHeaderText]="rowIndexHeaderText()" [resizable]="isResizable()" [columnWidths]="columnWidths()"
        [selectionMode]="selectionMode()" [showSelectionColumn]="showSelectionColumn()"
        [allSelected]="selection().isAllSelected(sortedRows())"
        [indeterminate]="selection().isPartiallySelected(sortedRows())"
        (sortChange)="onSortChange($event)" (columnResize)="onColumnResize($event)"
        (selectAllChange)="onSelectAllChange($event)" />
    <ui-table-body [columns]="resolvedColumns()" [rows]="sortedRows()" [showRowIndexIndicator]="showRowIndexIndicator()"
        [rowIndexOffset]="rowIndexOffset()" [columnWidths]="columnWidths()"
        [selectionMode]="selectionMode()" [showSelectionColumn]="showSelectionColumn()"
        [selection]="selection()" [rowClickSelect]="rowClickSelect()"
        [activeIndex]="activeIndex()"
        (rowClick)="onRowClick($event)" />
    @if (showBuiltInPaginator()) {
    <ui-table-footer [pageIndex]="datasource().pageIndex()" [pageSize]="datasource().pageSize()"
        [totalItems]="datasource().totalItems()" (pageIndexChange)="onPageChange($event)" />
    }
</section>
