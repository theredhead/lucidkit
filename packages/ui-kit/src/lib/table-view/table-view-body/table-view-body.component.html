<cdk-virtual-scroll-viewport
  [itemSize]="rowHeight()"
  class="table-body-viewport"
>
  <div
    *cdkVirtualFor="let row of rows(); let rowIndex = index"
    class="table-row"
    [class.table-row--loading]="row === null"
    [class.table-row--selected]="isRowSelected(row)"
    [class.table-row--selectable]="selectionMode() !== 'none' && rowClickSelect()"
    [style.height.px]="rowHeight()"
    [style.min-height.px]="rowHeight()"
    (click)="rowClickSelect() ? onRowClick(row) : null"
  >
    @if (showRowIndexIndicator()) {
      <div class="table-cell table-cell--row-index">
        @if (row !== null) {
          {{ rowIndexOffset() + rowIndex + 1 }}
        }
      </div>
    }
    @if (selectionMode() === 'single') {
      <div class="table-cell table-cell--selection">
        @if (row !== null) {
          <input
            type="radio"
            class="tv-row-radio"
            [checked]="isRowSelected(row)"
            (click)="$event.stopPropagation()"
            (change)="onSelectionToggle(row)"
            aria-label="Select row"
          />
        }
      </div>
    }
    @if (selectionMode() === 'multiple') {
      <div class="table-cell table-cell--selection">
        @if (row !== null) {
          <input
            type="checkbox"
            class="tv-row-checkbox"
            [checked]="isRowSelected(row)"
            (click)="$event.stopPropagation()"
            (change)="onSelectionToggle(row)"
            aria-label="Select row"
          />
        }
      </div>
    }
    @for (col of columns(); track col.key()) {
      <div
        class="table-cell"
        [style.width.px]="getColWidth(col.key())"
        [style.min-width.px]="getColWidth(col.key()) ? minColumnWidth : null"
        [style.flex]="getColWidth(col.key()) ? '0 0 auto' : '1'"
      >
        @if (row !== null) {
          <ng-container
            [ngTemplateOutlet]="col.cellTemplate"
            [ngTemplateOutletContext]="{ $implicit: row, column: col }"
          />
        } @else {
          <span class="table-cell-skeleton"></span>
        }
      </div>
    }
  </div>
</cdk-virtual-scroll-viewport>
