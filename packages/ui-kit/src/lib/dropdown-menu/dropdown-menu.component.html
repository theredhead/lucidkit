<div
  class="dropdown-trigger"
  tabindex="0"
  role="button"
  aria-haspopup="menu"
  [attr.aria-expanded]="isOpen()"
  (click)="toggleMenu()"
  (keydown.enter)="toggleMenu()"
  (keydown.space)="toggleMenu(); $event.preventDefault()"
>
  <ng-content select="[trigger]" />
</div>
@if (isOpen()) {
  <div
    class="dropdown-panel"
    [class.dropdown-panel--end]="align() === 'end'"
    [attr.aria-label]="ariaLabel()"
    role="menu"
    tabindex="-1"
    (click)="onItemClick()"
    (keydown.enter)="onItemClick()"
    (keydown.space)="onItemClick()"
  >
    <ng-content />
  </div>
}
