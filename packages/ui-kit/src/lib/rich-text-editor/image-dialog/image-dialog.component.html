<div class="ld-field">
  <label class="ld-label" for="id-src">Image URL</label>
  <input
    id="id-src"
    class="ld-input"
    type="url"
    placeholder="https://example.com/image.png"
    [ngModel]="src()"
    (ngModelChange)="src.set($event)"
    (keydown.enter)="apply()"
  />
</div>
<div class="ld-field">
  <label class="ld-label" for="id-alt">Alt text</label>
  <input
    id="id-alt"
    class="ld-input"
    type="text"
    placeholder="Describe the image"
    [ngModel]="alt()"
    (ngModelChange)="alt.set($event)"
    (keydown.enter)="apply()"
  />
</div>
<div class="ld-actions">
  <button
    type="button"
    class="ld-btn ld-btn--cancel"
    (click)="cancel()"
  >
    Cancel
  </button>
  <button
    type="button"
    class="ld-btn ld-btn--apply"
    [disabled]="!src().trim()"
    (click)="apply()"
  >
    <ui-icon [svg]="imageIcon" [size]="14" />
    Insert image
  </button>
</div>
