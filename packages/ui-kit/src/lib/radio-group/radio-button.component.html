<span
  class="control"
  role="radio"
  [attr.aria-checked]="isChecked()"
  [attr.aria-disabled]="isDisabled()"
  [attr.aria-label]="ariaLabel()"
  [attr.tabindex]="isDisabled() ? -1 : 0"
  (click)="select()"
  (keydown)="onKeyDown($event)"
>
  <span class="circle">
    @if (isChecked()) {
      <span class="dot"></span>
    }
  </span>
</span>
<span class="label" (click)="select()" (keydown)="onKeyDown($event)" role="presentation">
  <ng-content />
</span>
