<span
  class="control"
  [attr.role]="role()"
  [attr.aria-checked]="ariaChecked()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-disabled]="disabled()"
  [attr.tabindex]="disabled() ? -1 : 0"
  (click)="toggle()"
  (keydown)="onKeyDown($event)"
>
  @if (variant() === 'checkbox') {
    <span class="box">
      @if (indeterminate()) {
        <svg class="icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <line x1="4" y1="8" x2="12" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      } @else if (checked()) {
        <svg class="icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <polyline points="3.5,8.5 6.5,11.5 12.5,4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      }
    </span>
  } @else {
    <span class="track">
      <span class="thumb"></span>
    </span>
  }
</span>
<span class="label" (click)="toggle()" (keydown)="onKeyDown($event)" role="presentation">
  <ng-content />
</span>
