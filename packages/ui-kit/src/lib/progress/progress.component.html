@if (variant() === 'linear') {
  <div class="track">
    @if (mode() === 'determinate') {
      <div class="fill" [style.width.%]="clampedValue()"></div>
    } @else {
      <div class="fill fill--indeterminate"></div>
    }
  </div>
} @else {
  <svg class="ring" viewBox="0 0 40 40">
    <circle class="ring-track" cx="20" cy="20" r="18" />
    <circle
      class="ring-fill"
      [class.ring-fill--indeterminate]="mode() === 'indeterminate'"
      cx="20" cy="20" r="18"
      [attr.stroke-dasharray]="circumference"
      [attr.stroke-dashoffset]="mode() === 'determinate' ? strokeDashoffset() : circumference * 0.75"
    />
  </svg>
}
