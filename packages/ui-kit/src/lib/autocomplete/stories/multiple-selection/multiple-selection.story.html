
    <ui-autocomplete
      [datasource]="ds"
      [(value)]="selected"
      [multiple]="true"
      [placeholder]="placeholder()"
      [minChars]="minChars()"
      [disabled]="disabled()"
      [ariaLabel]="ariaLabel()"
      (itemSelected)="itemSelected.emit($event)"
      (itemRemoved)="itemRemoved.emit($event)"
    />
    <pre class="story-output">Selected: {{ selected() | json }}</pre>
