
    <div style="display: flex; flex-direction: column; gap: 0.75rem">
      <div style="width: 100%; height: 400px; max-width: 640px">
        <ui-image-cropper
          #cropper
          [aspectRatio]="aspectRatio()"
          [outputFormat]="outputFormat()"
          [outputQuality]="outputQuality()"
          [disabled]="disabled()"
          [ariaLabel]="ariaLabel()"
          (regionChange)="onRegionChange($event)"
        />
      </div>

      <div style="display: flex; gap: 0.5rem; align-items: center">
        <ui-button (click)="onCropToImageData()">Export as ImageData</ui-button>
        <ui-button variant="outlined" (click)="onReset()">Reset</ui-button>
        @if (regionInfo()) {
          <span style="font-size: 0.8125rem; opacity: 0.65">
            {{ regionInfo() }}
          </span>
        }
      </div>

      @if (croppedInfo()) {
        <p style="font-size: 0.8125rem">{{ croppedInfo() }}</p>
      }
    </div>
