
    <ui-tree-view
      [datasource]="ds"
      [displayWith]="displayWith"
      ariaLabel="Organization chart"
    >
      <ng-template #nodeTemplate let-node>
        <div style="line-height: 1.3">
          <strong>{{ node.data.name }}</strong>
          <div style="font-size: 0.75rem; opacity: 0.7;">
            {{ node.data.title }}
          </div>
        </div>
      </ng-template>
    </ui-tree-view>
