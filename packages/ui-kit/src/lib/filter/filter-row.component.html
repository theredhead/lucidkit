<div class="controls" role="group" [attr.aria-label]="'Filter rule ' + rule().id">
  <!-- Field selector -->
  <ui-dropdown-list
    ariaLabel="Filter field"
    [options]="fieldOptions()"
    [value]="rule().field"
    (valueChange)="onFieldChange($event)"
  />

  <!-- Operator selector -->
  <ui-dropdown-list
    ariaLabel="Operator"
    [options]="operatorOptions()"
    [value]="rule().operator"
    (valueChange)="onOperatorChange($event)"
  />

  <!-- Value input(s) — shape depends on operator -->
  @if (!hideValue()) {
    @if (isInTheLast()) {
      <!-- Relative date: amount + unit -->
      <ui-input
        type="number"
        ariaLabel="Amount"
        [value]="rule().value"
        (valueChange)="onValueChange($event)"
        placeholder="Amount"
      />
      <ui-dropdown-list
        ariaLabel="Time unit"
        [options]="dateUnitOptions"
        [value]="rule().unit ?? 'days'"
        (valueChange)="onUnitChange($event)"
      />
    } @else if (isBetween()) {
      <!-- Range: from … to -->
      <ui-input
        ariaLabel="From value"
        [type]="inputType()"
        [value]="rule().value"
        (valueChange)="onValueChange($event)"
      />
      <span class="separator" aria-hidden="true">and</span>
      <ui-input
        ariaLabel="To value"
        [type]="inputType()"
        [value]="rule().valueTo ?? ''"
        (valueChange)="onValueToChange($event)"
      />
    } @else {
      <!-- Standard single value — mode depends on distinct values -->
      @if (valueInputMode() === 'select') {
        <ui-dropdown-list
          ariaLabel="Filter value"
          [options]="valueSelectOptions()"
          [value]="rule().value"
          (valueChange)="onValueChange($event)"
        />
      } @else if (valueInputMode() === 'autocomplete') {
        <ui-autocomplete
          [datasource]="autocompleteDatasource()"
          ariaLabel="Filter value"
          placeholder="Type to search…"
          [minChars]="0"
          (itemSelected)="onValueChange($event)"
        />
      } @else {
        <ui-input
          ariaLabel="Filter value"
          [type]="inputType()"
          [value]="rule().value"
          (valueChange)="onValueChange($event)"
        />
      }
    }
  }

  <!-- Remove rule -->
  <ui-button variant="ghost" size="small" ariaLabel="Remove filter rule" (click)="remove.emit()">✕</ui-button>
</div>
