@if (mode() === 'simple') {
  <!-- ── Simple mode: single search textbox ── -->
  <div class="ui-filter__simple">
    <ui-input
      type="text"
      ariaLabel="Search all fields"
      placeholder="Find…"
      [value]="simpleQuery()"
      (valueChange)="onSimpleInput($event)"
    />
    @if (showModeToggle()) {
      <ui-button
        variant="ghost"
        size="sm"
        ariaLabel="Switch to advanced filter"
        (click)="toggleMode()"
      ><ui-icon [svg]="advancedIcon" [size]="14" /> Advanced</ui-button>
    }
  </div>
} @else {
  <!-- ── Advanced mode: full predicate builder ── -->
  <div class="ui-filter__header" role="group" aria-label="Filter junction">
    @if (allowJunction()) {
      <span id="filter-junction-label">Match</span>
      <ui-select
        ariaLabel="Filter junction"
        [options]="junctionOptions"
        [value]="currentJunction()"
        (valueChange)="setJunction($event)"
      />
      <span>of the following rules:</span>
    } @else {
      <span>Match <strong>all</strong> of the following rules:</span>
    }
    @if (showModeToggle()) {
      <ui-button
        class="ui-filter__mode-toggle"
        variant="ghost"
        size="sm"
        ariaLabel="Switch to simple search"
        (click)="toggleMode()"
      ><ui-icon [svg]="simpleIcon" [size]="14" /> Simple</ui-button>
    }
  </div>

  <div class="ui-filter__rules" role="list" aria-label="Filter rules" aria-live="polite">
    @for (rule of rules(); track rule.id; let idx = $index) {
      <ui-filter-row
        role="listitem"
        [fields]="augmentedFields()"
        [rule]="rule"
        [distinctValuesMap]="distinctValuesMap()"
        (ruleChange)="updateRule(idx, $event)"
        (remove)="removeRule(idx)"
      />
    }
  </div>

  <div class="ui-filter__actions">
    <ui-button variant="ghost" size="sm" ariaLabel="Add filter rule" (click)="addRule()">+ Add Rule</ui-button>
  </div>
}
