@if (multiline()) {
  <textarea
    #nativeInput
    [disabled]="disabled()"
    [placeholder]="placeholder()"
    [rows]="rows()"
    [attr.aria-label]="ariaLabel()"
    (input)="onInput($event)"
  ></textarea>
  @if (heightAdjustable()) {
    <div
      class="resize-handle"
      role="separator"
      aria-orientation="horizontal"
      aria-label="Resize text area"
      (pointerdown)="onResizePointerDown($event)"
    ></div>
  }
} @else {
  @if (prefixIcon(); as icon) {
    <button
      type="button"
      class="icon icon--prefix"
      [attr.aria-label]="hasPopup() ? 'Toggle popup' : 'Prefix action'"
      (click)="onPrefixClick()"
    >
      <ui-icon [svg]="icon" [size]="16" />
    </button>
  }
  <input
    #nativeInput
    [type]="effectiveType()"
    [disabled]="disabled()"
    [placeholder]="placeholder()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-expanded]="hasPopup() ? isPopupOpen() : null"
    [attr.aria-controls]="hasPopup() && isPopupOpen() ? popupId : null"
    [attr.role]="hasPopup() ? 'combobox' : null"
    (input)="onInput($event)"
    (keydown)="onInputKeydown($event)"
  />
  @if (suffixIcon(); as icon) {
    <button
      type="button"
      class="icon icon--suffix"
      [attr.aria-label]="hasPopup() ? 'Toggle popup' : 'Suffix action'"
      (click)="onSuffixClick()"
    >
      <ui-icon [svg]="icon" [size]="16" />
    </button>
  }
  @if (isPopupOpen()) {
    <div
      class="input-popup-anchor"
      role="dialog"
      aria-modal="true"
      [id]="popupId"
      (click)="$event.stopPropagation()"
      (keydown)="$event.stopPropagation()"
    >
      <ng-container #popupContainer />
    </div>
  }
}
