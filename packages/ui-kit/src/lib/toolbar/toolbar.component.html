<div
	class="toolbar-shell"
	uiSurface
	[surfaceType]="shellSurfaceType()"
	role="toolbar"
	[attr.aria-label]="ariaLabel()"
	[attr.aria-hidden]="isFloatingToggleMode() && floatingState() === 'collapsed' ? 'true' : null"
	(animationend)="handleShellAnimationEnd()"
>
	<div class="toolbar-content">
		<ng-content></ng-content>
	</div>
</div>

@if (isFloatingToggleMode()) {
	<button
		type="button"
		class="toolbar-toggle floating-toggle-button"
		[attr.aria-label]="getFloatingToggleLabel()"
		[attr.aria-expanded]="!collapsed()"
		[title]="getFloatingToggleLabel()"
		(click)="toggleCollapsed()"
	>
		<ui-icon [svg]="getFloatingToggleIcon()" [size]="14" />
	</button>
}
