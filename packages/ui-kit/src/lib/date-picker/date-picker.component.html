<div class="dp-input-wrapper">
  <input
    class="dp-input"
    type="text"
    autocomplete="off"
    [value]="inputText()"
    [disabled]="disabled()"
    [readOnly]="readonly()"
    [placeholder]="effectivePlaceholder()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="calendarId"
    (input)="onInput($event)"
    (blur)="onBlur()"
    (keydown)="onInputKeydown($event)"
  />
  <button
    class="dp-toggle"
    type="button"
    tabindex="-1"
    aria-label="Toggle calendar"
    [disabled]="disabled() || readonly()"
    (mousedown)="$event.preventDefault()"
    (click)="toggleCalendar()"
  >
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
      <line x1="16" y1="2" x2="16" y2="6" />
      <line x1="8" y1="2" x2="8" y2="6" />
      <line x1="3" y1="10" x2="21" y2="10" />
    </svg>
  </button>
</div>

@if (isOpen()) {
  <div
    class="dp-calendar"
    role="dialog"
    aria-modal="true"
    [id]="calendarId"
    [attr.aria-label]="'Calendar – ' + monthYearLabel()"
    (keydown)="onCalendarKeydown($event)"
  >
    <!-- Calendar header -->
    <div class="dp-cal-header">
      <button
        class="dp-cal-nav"
        type="button"
        aria-label="Previous year"
        (mousedown)="$event.preventDefault()"
        (click)="prevYear()"
      >
        «
      </button>
      <button
        class="dp-cal-nav"
        type="button"
        aria-label="Previous month"
        (mousedown)="$event.preventDefault()"
        (click)="prevMonth()"
      >
        ‹
      </button>
      <span class="dp-cal-title">{{ monthYearLabel() }}</span>
      <button
        class="dp-cal-nav"
        type="button"
        aria-label="Next month"
        (mousedown)="$event.preventDefault()"
        (click)="nextMonth()"
      >
        ›
      </button>
      <button
        class="dp-cal-nav"
        type="button"
        aria-label="Next year"
        (mousedown)="$event.preventDefault()"
        (click)="nextYear()"
      >
        »
      </button>
    </div>

    <!-- Weekday headers -->
    <div class="dp-cal-weekdays" role="row">
      @for (wd of weekdayLabels(); track wd.long) {
        <span class="dp-cal-weekday" role="columnheader" [title]="wd.long">
          {{ wd.short }}
        </span>
      }
    </div>

    <!-- Day grid -->
    <div class="dp-cal-grid" role="grid">
      @for (day of calendarDays(); track day.date.getTime()) {
        <button
          class="dp-cal-day"
          type="button"
          role="gridcell"
          [class.dp-cal-day--outside]="!day.isCurrentMonth"
          [class.dp-cal-day--today]="day.isToday"
          [class.dp-cal-day--selected]="day.isSelected"
          [class.dp-cal-day--disabled]="day.isDisabled"
          [disabled]="day.isDisabled"
          [attr.aria-selected]="day.isSelected"
          [attr.aria-label]="day.date.toDateString()"
          (mousedown)="$event.preventDefault()"
          (click)="selectDay(day)"
        >
          {{ day.day }}
        </button>
      }
    </div>

    <!-- Footer -->
    <div class="dp-cal-footer">
      <button
        class="dp-cal-today"
        type="button"
        (mousedown)="$event.preventDefault()"
        (click)="goToToday()"
      >
        Today
      </button>
    </div>
  </div>
}
