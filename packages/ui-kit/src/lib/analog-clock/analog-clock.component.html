<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  [attr.width]="size()"
  [attr.height]="size()"
  [attr.aria-label]="ariaLabel()"
  role="img"
  class="face"
>
  <!-- Face background -->
  <circle cx="50" cy="50" r="49" class="bg" />

  <!-- Outer rim -->
  <circle cx="50" cy="50" r="49" class="rim" />

  <!-- Tick marks -->
  @if (showTickMarks()) {
    @for (tick of tickMarks(); track $index) {
      <line
        [attr.x1]="tick.x1"
        [attr.y1]="tick.y1"
        [attr.x2]="tick.x2"
        [attr.y2]="tick.y2"
        [class.tick--hour]="tick.isHour"
        [class.tick--minute]="!tick.isHour"
        class="tick"
      />
    }
  }

  <!-- Hour numbers -->
  @if (showNumbers()) {
    @for (num of hourNumbers(); track num.hour) {
      <text
        [attr.x]="num.x"
        [attr.y]="num.y"
        class="number"
        text-anchor="middle"
        dominant-baseline="central"
      >{{ num.hour }}</text>
    }
  }

  <!-- Day/night indicator (Lucide icon, scaled from 24×24 into clock face) -->
  <g
    class="indicator"
    transform="translate(45, 63) scale(0.417)"
    [attr.stroke]="indicatorColor()"
    fill="none"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <g [innerHTML]="indicatorSvg()"></g>
  </g>

  <!-- Hour hand -->
  <line
    x1="50" y1="50"
    x2="50" y2="24"
    class="hand hand--hour"
    [style.transform]="'rotate(' + hourAngle() + 'deg)'"
  />

  <!-- Minute hand -->
  <line
    x1="50" y1="50"
    x2="50" y2="16"
    class="hand hand--minute"
    [style.transform]="'rotate(' + minuteAngle() + 'deg)'"
  />

  <!-- Second hand -->
  @if (showSeconds()) {
    <line
      x1="50" y1="55"
      x2="50" y2="12"
      class="hand hand--second"
      [style.transform]="'rotate(' + secondAngle() + 'deg)'"
    />
  }

  <!-- Center cap -->
  <circle cx="50" cy="50" r="2" class="cap" />
</svg>
