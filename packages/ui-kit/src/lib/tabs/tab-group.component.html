<div class="header" role="tablist"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-orientation]="resolvedTabPosition() === 'left' || resolvedTabPosition() === 'right' ? 'vertical' : undefined">
  @for (tab of tabs(); track tab; let i = $index) {
    <button
      class="tab"
      role="tab"
      type="button"
      [class.tab--active]="i === activeIndex()"
      [class.tab--disabled]="tab.disabled()"
      [attr.aria-selected]="i === activeIndex()"
      [attr.aria-disabled]="tab.disabled() || undefined"
      [attr.tabindex]="i === activeIndex() ? 0 : -1"
      [attr.id]="'tab-' + i"
      [attr.aria-controls]="'panel-' + i"
      (click)="selectTab(i)"
      (keydown)="onTabKeyDown($event, i)"
      [attr.aria-label]="tab.resolvedAriaLabel()"
    >
      @if (tab.icon(); as svg) {
        <ui-icon [svg]="svg" [size]="14" />
      }
      @if (tab.label(); as label) {
        {{ label }}
      }
    </button>
  }
</div>

<div
  class="panel"
  role="tabpanel"
  [attr.id]="'panel-' + activeIndex()"
  [attr.aria-labelledby]="'tab-' + activeIndex()"
>
  @if (activeTab(); as tab) {
    <ng-container [ngTemplateOutlet]="tab.contentTemplate()" />
  }
</div>
