<div class="header" role="tablist"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-orientation]="resolvedTabPosition() === 'left' || resolvedTabPosition() === 'right' ? 'vertical' : undefined">
  @for (item of headerItems(); track item) {
    @if (isTab(item)) {
      <button
        class="tab"
        role="tab"
        type="button"
        [class.tab--active]="tabIndex(item) === activeIndex()"
        [class.tab--disabled]="item.disabled()"
        [attr.aria-selected]="tabIndex(item) === activeIndex()"
        [attr.aria-disabled]="item.disabled() || undefined"
        [attr.tabindex]="tabIndex(item) === activeIndex() ? 0 : -1"
        [attr.id]="'tab-' + tabIndex(item)"
        [attr.aria-controls]="'panel-' + tabIndex(item)"
        (click)="selectTab(tabIndex(item))"
        (keydown)="onTabKeyDown($event, tabIndex(item))"
        [attr.aria-label]="item.resolvedAriaLabel()"
      >
        @if (item.icon(); as svg) {
          <ui-icon [svg]="svg" [size]="14" />
        }
        @if (item.label(); as label) {
          {{ label }}
        }
      </button>
    } @else if (isSeparator(item)) {
      <div class="header-separator" role="separator" aria-orientation="vertical"></div>
    } @else if (isSpacer(item)) {
      <div class="header-spacer"></div>
    }
  }
</div>

<div
  class="panel"
  role="tabpanel"
  [attr.id]="'panel-' + activeIndex()"
  [attr.aria-labelledby]="'tab-' + activeIndex()"
>
  @if (activeTab(); as tab) {
    <ng-container [ngTemplateOutlet]="tab.contentTemplate()" />
  }
</div>
