
    <div
      style="display: flex; flex-direction: column; gap: 32px; padding: 16px; background: var(--ui-surface, #fff); color: var(--ui-text, #1d232b);"
    >
      <div>
        <h4 style="margin: 0 0 8px; color: var(--ui-text, #1d232b);">
          Countdown — 2 hours from now (dhms)
        </h4>
        <ui-countdown [target]="twoHours" format="dhms" />
      </div>
      <div>
        <h4 style="margin: 0 0 8px; color: var(--ui-text, #1d232b);">
          Countdown — 45 seconds (ms)
        </h4>
        <ui-countdown
          [target]="fortyFiveSec"
          format="ms"
          (expired)="onExpired()"
        />
        <p
          style="margin: 8px 0 0; font-size: 0.875rem; color: var(--ui-text-muted, #5a6470);"
        >
          expired: {{ expired() }}
        </p>
      </div>
      <div>
        <h4 style="margin: 0 0 8px; color: var(--ui-text, #1d232b);">
          Elapsed — since 5 minutes ago (hms)
        </h4>
        <ui-countdown [target]="fiveMinAgo" mode="elapsed" format="hms" />
      </div>
    </div>
