@if (!isMine()) {
  <ui-avatar
    [name]="message().sender.name"
    [src]="message().sender.avatarSrc"
    [email]="message().sender.avatarEmail"
    size="small"
  />
}

<div class="bubble-body">
  @if (!isMine()) {
    <span class="bubble-sender">{{ message().sender.name }}</span>
  }

  @if (isRichText()) {
    <div class="bubble-content" [innerHTML]="message().content"></div>
  } @else {
    <div class="bubble-content">{{ message().content }}</div>
  }

  <time class="bubble-timestamp">{{ timeString() }}</time>
</div>
