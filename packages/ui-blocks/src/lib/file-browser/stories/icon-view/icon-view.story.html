
    <div class="story-wrapper">
      <ui-file-browser
        [datasource]="ds"
        viewMode="icons"
        [showDetails]="true"
        [metadataProvider]="metadataProvider"
        (fileActivated)="onFileActivated($event)"
      />
    </div>
    @if (lastEvent()) {
      <div class="story-output">{{ lastEvent() }}</div>
    }
