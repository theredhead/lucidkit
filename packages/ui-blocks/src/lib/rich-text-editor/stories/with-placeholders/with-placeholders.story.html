<ui-rich-text-editor
  [mode]="mode()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [presentation]="presentation()"
  [placeholders]="placeholders()"
  [placeholder]="placeholder()"
  [ariaLabel]="ariaLabel()"
  (blockInserted)="blockInserted.emit($event)"
  (blockEdited)="blockEdited.emit($event)"
  (blockRemoved)="blockRemoved.emit($event)"
/>
