<ui-rich-text-editor
        [mode]="mode()"
        [disabled]="disabled()"
        [readonly]="readonly()"
        [presentation]="presentation()"
        [ariaLabel]="ariaLabel()"
        [imageHandler]="imageHandler()"

      />

      </p>
