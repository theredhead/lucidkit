
    <div class="controls">
      <ui-button variant="outlined" (click)="notifyFeed()"
        >Notify Activity (persists)</ui-button
      >
      <ui-button variant="outlined" (click)="notifyTasks()"
        >Notify Tasks (5 s timeout)</ui-button
      >
      <ui-button variant="outlined" (click)="clearAll()">Clear all</ui-button>
    </div>

    <ui-dashboard [columns]="3" [gap]="16">
      <ui-dashboard-panel
        [config]="{
          id: 'inbox',
          title: 'Inbox',
          icon: icons.Mail.Mail,
          collapsible: true,
        }"
      >
        <ul class="demo-list">
          <li>Welcome aboard!</li>
          <li>Your trial starts today</li>
        </ul>
      </ui-dashboard-panel>

      <ui-dashboard-panel
        #feedPanel
        [config]="{
          id: 'feed',
          title: 'Activity Feed',
          icon: icons.Account.Activity,
          collapsible: true,
        }"
      >
        <ul class="demo-list">
          <li>Alice deployed v2.4.1</li>
          <li>Bob merged PR #312</li>
          <li>Charlie added 3 tests</li>
        </ul>
      </ui-dashboard-panel>

      <ui-dashboard-panel
        #tasksPanel
        [config]="{
          id: 'tasks',
          title: 'Tasks',
          icon: icons.Text.ListTodo,
          collapsible: true,
        }"
      >
        <ul class="demo-list">
          <li>Update CI pipeline</li>
          <li>Write dashboard docs</li>
        </ul>
      </ui-dashboard-panel>
    </ui-dashboard>
