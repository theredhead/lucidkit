<header class="panel-header">
  <div class="panel-heading">
    @if (config().icon) {
      <ui-icon [svg]="config().icon!" [size]="14" class="panel-icon" />
    }
    <h3 class="panel-title">{{ config().title }}</h3>
  </div>

  <div class="panel-actions">
    @if (isCollapsible()) {
      <button
        type="button"
        class="panel-action-btn"
        [attr.aria-label]="collapsed() ? 'Expand panel' : 'Collapse panel'"
        [attr.aria-expanded]="!collapsed()"
        (click)="toggleCollapse()"
      >
        <ui-icon [svg]="collapseIcon()" [size]="14" />
      </button>
    }
    @if (isRemovable()) {
      <button
        type="button"
        class="panel-action-btn panel-action-btn--remove"
        aria-label="Remove panel"
        (click)="remove()"
      >
        <ui-icon [svg]="removeIcon" [size]="14" />
      </button>
    }
  </div>
</header>

@if (!collapsed()) {
  <div class="panel-body">
    <ng-content />
  </div>
}
