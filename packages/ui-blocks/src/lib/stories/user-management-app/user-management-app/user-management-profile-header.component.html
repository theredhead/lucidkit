<div class="detail-header">
  <ui-avatar [email]="email()" [name]="name()" size="large" />
  <div>
    <h3 class="detail-name">{{ name() }}</h3>
    <p class="detail-email">{{ email() }}</p>
  </div>
  <div class="status-slot">
    <ui-chip [color]="statusColor()">{{ status() }}</ui-chip>
  </div>
</div>
