<div class="container">
    <aside class="master">
        <header class="header">
            <h2>{{ masterTitle() }}</h2>
        </header>
        <mat-nav-list class="list">
            @for (item of items(); track item.id) {
            <mat-list-item [activated]="isItemSelected(item.id)" (click)="onSelectItem.emit(item)">
                <span matListItemTitle>{{ item.label }}</span>
            </mat-list-item>
            } @empty {
            <p class="empty">No items available</p>
            }
        </mat-nav-list>
    </aside>

    <main class="detail">
        @if (selectedItem(); as item) {
        <header class="header">
            <h2>{{ item.label }}</h2>
        </header>
        <mat-divider></mat-divider>
        <div class="content">
            <ng-content></ng-content>
        </div>
        } @else {
        <div class="placeholder">
            <p>{{ detailPlaceholderText() }}</p>
        </div>
        }
    </main>
</div>
