<!-- Hidden slot: instantiates projected columns so contentChildren can discover them. -->
<div class="mdv-columns-slot"><ng-content /></div>

<aside class="mdv-list-panel">
  <header class="mdv-header">
    <h2 class="mdv-title">{{ title() }}</h2>
  </header>

  @if (showFilter() && filterTemplate(); as filterTpl) {
    <div class="mdv-filter-bar">
      <button
        class="mdv-filter-toggle"
        type="button"
        (click)="toggleFilter()"
        [attr.aria-expanded]="!filterCollapsed()"
        aria-controls="mdv-filter-content"
      >
        <ui-icon
          [svg]="filterCollapsed() ? chevronRight : chevronDown"
          [size]="14"
        />
        <span>Filter</span>
      </button>
      @if (!filterCollapsed()) {
        <div class="mdv-filter-content" id="mdv-filter-content">
          <ng-container *ngTemplateOutlet="filterTpl" />
        </div>
      }
    </div>
  }

  <div class="mdv-table-wrapper">
    <ui-table-view
      [datasource]="resolvedDatasource()"
      [externalColumns]="columns()"
      [showBuiltInPaginator]="false"
      [showRowIndexIndicator]="false"
      selectionMode="single"
      [rowClickSelect]="true"
      [selectionModel]="selectionModel"
    />
  </div>
</aside>

<main class="mdv-detail-panel">
  @if (detailContext(); as ctx) {
    @if (detailTemplate(); as tpl) {
      <section class="mdv-detail-content">
        <ng-container *ngTemplateOutlet="tpl; context: ctx" />
      </section>
    }
  } @else {
    <div class="mdv-placeholder">
      <p>{{ placeholder() }}</p>
    </div>
  }
</main>
