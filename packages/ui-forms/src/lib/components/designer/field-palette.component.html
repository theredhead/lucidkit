<h3 class="heading" id="heading-fields">Fields</h3>
<nav class="list" aria-labelledby="heading-fields">
  @for (ft of fieldTypes; track ft.key) {
    <button
      type="button"
      class="item"
      [attr.aria-label]="'Add ' + ft.label + ' field: ' + ft.description"
      (click)="fieldRequested.emit(ft.key)"
      draggable="true"
      (dragstart)="onDragStart($event, ft.key)"
    >
      <ui-icon
        class="icon"
        [svg]="ft.icon"
        [size]="16"
        aria-hidden="true"
      />
      <span class="label">{{ ft.label }}</span>
    </button>
  }
</nav>
