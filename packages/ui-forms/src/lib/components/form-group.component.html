@if (state().visible()) {
  @if (state().definition.title) {
    <h3 class="title">{{ state().definition.title }}</h3>
  }
  @if (state().definition.description) {
    <p class="description">{{ state().definition.description }}</p>
  }
  <div class="fields">
    @for (field of state().fields; track field.definition.id) {
      <ui-form-field [state]="field" [fieldMinWidth]="fieldMinWidth()" />
    }
  </div>
}
