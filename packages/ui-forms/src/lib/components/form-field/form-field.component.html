@if (state().visible() && !isFlair()) {
  <label class="label" [attr.for]="state().definition.id">
    {{ state().definition.title }}
    @if (isRequired()) {
      <span class="required" aria-hidden="true">*</span>
    }
  </label>

  @if (state().definition.description) {
    <p class="description">{{ state().definition.description }}</p>
  }
}

<div class="control" [class.control--hidden]="!state().visible()" [style.width.px]="isTextInput() ? fieldMinWidth() : null">
  <ng-container #outlet />
</div>

@if (state().visible() && !isFlair() && showErrors()) {
  <ul class="errors" role="alert">
    @for (error of state().validation().errors; track error.type) {
      <li class="error">{{ error.message }}</li>
    }
  </ul>
}
