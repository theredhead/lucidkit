server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Landing page ─────────────────────────────────────────────
    location = / {
        try_files /landing/index.html =404;
    }

    # ── Storybook ────────────────────────────────────────────────
    location /storybook {
        try_files $uri $uri/ /storybook/index.html;
    }

    # Never cache HTML entry points (stale HTML = stale JS references)
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # Cache hashed JS/CSS/fonts aggressively (content-addressed, safe to cache forever)
    location ~* \.(js|css|woff2|woff|ttf|png|svg|jpg|jpeg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
    }

    # ── TypeDoc API docs ─────────────────────────────────────────
    location /docs {
        try_files $uri $uri/ /docs/index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
