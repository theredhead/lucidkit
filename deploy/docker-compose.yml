services:
  lucidkit:
    image: theredhead/lucidkit-docs:1.0.0
    restart: always
    # No ports exposed — NPM proxies internally via the shared network

  npm:
    image: jc21/nginx-proxy-manager:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"      # Admin UI — restrict or remove after setup
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

volumes:
  npm_data:
  npm_letsencrypt:
